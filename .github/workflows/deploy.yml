name: Deploy Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  deploy-check:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DEBUG: "False"
      SECRET_KEY: ci-secret-key-with-enough-entropy-1234567890-abcdef
      ALLOWED_HOSTS: example.com,.example.com
      CSRF_TRUSTED_ORIGINS: https://example.com,https://app.example.com
      SECURE_HSTS_SECONDS: "31536000"
      SECURE_HSTS_INCLUDE_SUBDOMAINS: "True"
      SECURE_HSTS_PRELOAD: "True"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Run deploy checks
        run: uv run python manage.py check --deploy --fail-level WARNING
